<script>
  document.addEventListener("DOMContentLoaded", function () {
    var progressBar = document.createElement("div");
    progressBar.id = "scroll-progress";
    document.body.appendChild(progressBar);

    function updateScrollProgress() {
      var maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      var ratio = maxScroll > 0 ? (window.scrollY / maxScroll) * 100 : 0;
      progressBar.style.width = ratio + "%";
    }

    window.addEventListener("scroll", updateScrollProgress, { passive: true });
    window.addEventListener("resize", updateScrollProgress);
    updateScrollProgress();

    if (!("IntersectionObserver" in window)) {
      return;
    }

    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll(".reveal-block").forEach(function (element) {
      var children = element.querySelectorAll(".feature-card, .publication-row, .stack-item, .signal-card, .editorial-note, .metrics-panel, .identity-panel, .contact-panel");
      children.forEach(function (child, index) {
        child.style.setProperty("--stagger-delay", (index * 90) + "ms");
        child.classList.add("reveal-stagger");
        child.classList.add("glass-interactive");
      });
      observer.observe(element);
    });

    document.querySelectorAll(".glass-interactive").forEach(function (element) {
      element.addEventListener("pointermove", function (event) {
        var rect = element.getBoundingClientRect();
        element.style.setProperty("--pointer-x", (event.clientX - rect.left) + "px");
        element.style.setProperty("--pointer-y", (event.clientY - rect.top) + "px");
      });
    });
  });
</script>
