<!-- ================================================
     PREMIUM UPGRADE — typography, motion & polish
     ================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ---- 1. Font upgrade: Inter body + Space Grotesk headings ---- */
body, p, li, dd, dt,
.sidebar p, .sidebar li, .author__bio,
.author__name, .author__urls, .nav__list {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  letter-spacing: -0.01em;
}
h1, h2, h3, h4, h5, h6 {
  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  letter-spacing: -0.03em;
}

/* ---- 1b. Grain texture overlay (like h-gupta.com) ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  opacity: 0.025;
  pointer-events: none;
  z-index: 9998;
}

/* ---- 1c. Custom scrollbar ---- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #f8f9fb; }
::-webkit-scrollbar-thumb {
  background: #c5cfe0;
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover { background: #224b8d; }

/* ---- 1d. Float-wave on profile image ---- */
@keyframes float-wave {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-6px); }
}
.author__avatar img {
  animation: float-wave 4s ease-in-out infinite !important;
}
.author__avatar img:hover {
  animation-play-state: paused !important;
}

/* ---- 2. Reading progress bar ---- */
#reading-progress {
  position: fixed;
  top: 0; left: 0;
  width: 0%;
  height: 2px;
  background: linear-gradient(90deg, #224b8d 0%, #5a9fd4 100%);
  z-index: 99999;
  transition: width 0.08s linear;
  border-radius: 0 2px 2px 0;
}

/* ---- 3. Scroll reveal ---- */
.sr-hidden {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1),
              transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
}
.sr-visible {
  opacity: 1;
  transform: translateY(0);
}

/* ---- 4. Glassmorphism navbar ---- */
.masthead {
  backdrop-filter: blur(14px) !important;
  -webkit-backdrop-filter: blur(14px) !important;
  background: rgba(255, 255, 255, 0.88) !important;
  border-bottom: 1px solid rgba(200, 215, 235, 0.55) !important;
  box-shadow: 0 1px 24px rgba(0, 0, 0, 0.055) !important;
}

/* ---- 5. Section h1 — subtle accent line below ---- */
.page__content h1 {
  border-bottom: none !important;
  position: relative;
  padding-bottom: 0.55em;
  margin-bottom: 0.9em;
}
.page__content h1::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 36px; height: 2px;
  background: linear-gradient(90deg, #224b8d, rgba(34, 75, 141, 0));
  border-radius: 2px;
}

/* ---- 6. Section h3 — left bar ---- */
.page__content h3 {
  padding: 0.4em 0.9em;
  border-left: 3px solid #224b8d;
  background: linear-gradient(90deg, rgba(34, 75, 141, 0.05), transparent);
  border-radius: 0 8px 8px 0;
  margin-top: 1.6em;
}

/* ---- 7. Paper-box cards — hover lift ---- */
.paper-box {
  border-radius: 12px !important;
  padding: 1.5em !important;
  border: 1px solid #efefef !important;
  border-bottom: 1px solid #efefef !important;
  margin-bottom: 1.2em !important;
  transition: box-shadow 0.3s ease, transform 0.3s ease !important;
  background: #fff;
}
.paper-box:hover {
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.09) !important;
  transform: translateY(-4px) !important;
}
.paper-box img {
  border-radius: 8px !important;
  transition: box-shadow 0.3s ease !important;
}
.paper-box:hover img {
  box-shadow: 0 6px 22px rgba(0, 0, 0, 0.14) !important;
}

/* ---- 8. Badge — gradient ---- */
.badge {
  background: linear-gradient(135deg, #1a3d7a, #2d5fb5) !important;
  border-radius: 6px !important;
  font-weight: 600 !important;
  letter-spacing: 0.02em !important;
  box-shadow: 0 2px 8px rgba(34, 75, 141, 0.35) !important;
  font-size: 0.74em !important;
}

/* ---- 9. Animated underline on links ---- */
.page__content a:not(.btn) {
  text-decoration: none !important;
  background-image: linear-gradient(currentColor, currentColor);
  background-size: 0% 1px;
  background-repeat: no-repeat;
  background-position: 0% 100%;
  transition: background-size 0.28s ease !important;
}
.page__content a:not(.btn):hover {
  background-size: 100% 1px;
  text-decoration: none !important;
}

/* ---- 10. Profile image ---- */
.author__avatar img {
  border-radius: 50% !important;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12) !important;
  transition: box-shadow 0.3s ease, transform 0.3s ease !important;
}
.author__avatar img:hover {
  box-shadow: 0 8px 36px rgba(34, 75, 141, 0.2) !important;
  transform: scale(1.04) !important;
}

/* ---- 11. Social icons — bounce on hover ---- */
.social-icons a {
  display: inline-block;
  transition: transform 0.2s ease !important;
}
.social-icons a:hover {
  transform: translateY(-3px) scale(1.12) !important;
}

/* ---- 12. News timeline ---- */
.news-timeline {
  list-style: none !important;
  padding-left: 0 !important;
  border-left: 2px solid #dde4f0;
  margin-left: 8px !important;
}
.news-timeline > li {
  position: relative;
  padding: 0.55em 0 0.55em 1.6em !important;
  margin-bottom: 0.1em !important;
  border-radius: 0 8px 8px 0;
  transition: background 0.2s ease;
}
.news-timeline > li::before {
  content: '';
  position: absolute;
  left: -5px;
  top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #224b8d;
  border: 2px solid #fff;
  box-shadow: 0 0 0 2px #224b8d;
}
.news-timeline > li:hover {
  background: rgba(34, 75, 141, 0.04);
}

/* ---- 13. Tech badge stack ---- */
.tech-stack {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 1em 0 1.4em;
}
.tech-badge {
  display: inline-flex;
  align-items: center;
  padding: 5px 14px;
  background: #f6f8fa;
  border: 1px solid #e1e4e8;
  border-radius: 20px;
  font-size: 0.81em;
  font-weight: 500;
  color: #24292f;
  cursor: default;
  transition: background 0.22s ease, color 0.22s ease,
              border-color 0.22s ease, transform 0.22s ease,
              box-shadow 0.22s ease;
  line-height: 1.4;
}
.tech-badge:hover {
  background: #224b8d;
  color: #fff;
  border-color: #224b8d;
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(34, 75, 141, 0.28);
}

/* ---- 14. Footer contact block ---- */
.page__content > div[style*="f5f5f5"],
.page__content > div[style*="background-color"] {
  background: linear-gradient(135deg, #f8f9fc, #eef1f8) !important;
  border: 1px solid #dde4f0 !important;
  box-shadow: 0 4px 24px rgba(34, 75, 141, 0.07) !important;
}

/* ---- 15. Smooth scroll & HR ---- */
html { scroll-behavior: smooth; }
hr {
  border-top: 1px solid #eaeef4 !important;
  margin: 1.8em 0 !important;
}
</style>

<script>
(function () {
  'use strict';

  // Reading progress bar
  function updateProgress() {
    var bar = document.getElementById('reading-progress');
    if (!bar) return;
    var scrolled = window.scrollY || document.documentElement.scrollTop;
    var total = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (total > 0 ? (scrolled / total) * 100 : 0) + '%';
  }

  // Scroll-reveal for key content blocks
  function setupReveal() {
    if (!window.IntersectionObserver) return;
    var targets = document.querySelectorAll(
      '.page__content h1, .page__content h3, .paper-box'
    );
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          e.target.classList.replace('sr-hidden', 'sr-visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });

    targets.forEach(function (el) {
      el.classList.add('sr-hidden');
      io.observe(el);
    });
  }

  // Convert #news ul into timeline
  function setupTimeline() {
    var newsHeading = document.getElementById('news');
    if (!newsHeading) return;
    var sib = newsHeading.nextElementSibling;
    while (sib) {
      if (sib.tagName === 'UL') {
        sib.classList.add('news-timeline');
        break;
      }
      sib = sib.nextElementSibling;
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    // Inject progress bar at top of body
    var bar = document.createElement('div');
    bar.id = 'reading-progress';
    document.body.insertBefore(bar, document.body.firstChild);

    window.addEventListener('scroll', updateProgress, { passive: true });
    updateProgress();

    setupReveal();
    setupTimeline();
  });
}());
</script>
